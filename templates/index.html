<!DOCTYPE html>
<html>
<head>
    <title>Study Mind AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="main-container">

        <h1>🧠 Study Mind AI</h1>

        <div class="card">

            <div class="chat-box" id="output">
                <p class="placeholder">Your explanation will appear here...</p>
            </div>

            <div class="input-section">
                <input type="text" id="topicInput" placeholder="Enter topic...">
                <button id="explainBtn">Explain</button>
            </div>

            <div class="extra-buttons">
                <button>Quiz</button>
                <button>Exam</button>
                <button>Speak</button>
                <button>Confusion</button>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
