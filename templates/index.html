<!DOCTYPE html>
<html>
<head>
    <title>Study Mind AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-container">

    <div class="chat-card">

        <div class="header">
            <div class="logo">🧠</div>
            <h1>Study Mind AI</h1>
        </div>

        <div class="chat-box" id="output">
            <div class="message ai">
                Ask me anything and I’ll explain it clearly.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="topicInput" placeholder="Ask something...">
            <button id="explainBtn">Send</button>
        </div>

        <div class="options">
            <button>Quiz</button>
            <button>Exam</button>
            <button>Speak</button>
            <button>Confusion</button>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
