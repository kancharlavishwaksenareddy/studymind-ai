<!DOCTYPE html>
<html>
<head>
    <title>Study Mind AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-wrapper">

    <header>
        🧠 Study Mind AI
    </header>

    <!-- Welcome -->
    <div class="welcome" id="welcomeScreen">
        <h1>Where should we start?</h1>
        <div class="subtext">Ask me anything and I’ll explain it clearly.</div>
    </div>

    <!-- Chat Area -->
    <div class="chat-container" id="output"></div>

    <!-- Input Area -->
    <div class="input-container">
        <input type="text" id="topicInput" placeholder="Type your question...">
        <button id="explainBtn">Send</button>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
